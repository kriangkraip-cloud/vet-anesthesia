<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Animal Space Hospital</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="margin-bottom:0.75rem">
        <img src="/static/img/logo.png" alt="Animal Space Hospital" style="height:90px;width:auto;object-fit:contain">
      </div>
      <h1>Animal Space Hospital</h1>
      <p>Clinical Anesthetic Records System</p>
    </div>

    <form id="login-form">
      <div class="form-group mb-3">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group mb-4">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
      <p id="login-error" class="text-danger text-sm mt-2 hidden"></p>
    </form>

  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = "/dashboard";

  document.getElementById("login-form").addEventListener("submit", async e => {
    e.preventDefault();
    const btn = e.target.querySelector("button[type=submit]");
    const errEl = document.getElementById("login-error");
    btn.disabled = true;
    btn.textContent = "Signing in…";
    errEl.classList.add("hidden");

    try {
      const data = await API.login(
        document.getElementById("username").value.trim(),
        document.getElementById("password").value
      );
      localStorage.setItem("vet_token", data.access_token);
      localStorage.setItem("vet_user", JSON.stringify({
        id: data.user_id, username: data.username,
        full_name: data.full_name, role: data.role,
      }));
      window.location.href = "/dashboard";
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });
</script>
</body>
</html>
